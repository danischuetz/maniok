# Reusable workflow to build and publish a Docker image to GHCR
name: Build & Publish Docker Image

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      image_name:
        description: 'Image name (for GHCR tag)'
        required: true
        type: string
      tag:
        description: 'Git tag or ref to deploy (tag required for production)'
        required: false
        type: string
      environment:
        description: 'Environment to deploy to [staging, production]'
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Resolve source ref
        id: resolve_ref
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - name: Verify tag exists
        if: inputs.environment == 'production'
        run: |
          if [[ -z "${{ inputs.tag }}" ]]; then
            echo "Production deployments require a git tag." >&2
            exit 1
          fi

          if ! git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.tag }} does not exist!" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag (strip v prefix)
        if: inputs.environment == 'production'
        id: prep_tag
        run: |
          tag="${{ inputs.tag }}"
          if [[ "$tag" =~ ^v(.+) ]]; then
            clean_tag="${tag:1}"
          else
            clean_tag="$tag"
          fi
          echo "clean_tag=$clean_tag" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image (production)
        if: inputs.environment == 'production'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:${{ steps.prep_tag.outputs.clean_tag }}
            ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:latest
      
      - name: Build and push Docker image (staging)
        if: inputs.environment == 'staging'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:staging

      - name: Upload Caddyfile
        uses: actions/upload-artifact@v4
        with:
          name: Caddyfile
          path: Caddyfile

      - name: Upload compose.yml
        uses: actions/upload-artifact@v4
        with:
          name: compose.yml
          path: compose.yml