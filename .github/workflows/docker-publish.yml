# Reusable workflow to build and publish a Docker image to GHCR
name: Build & Publish Docker Image

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      image_name:
        description: 'Image name (for GHCR tag)'
        required: true
        type: string

jobs:
  build-and-push:
    # Only run for tag refs matching v* (e.g. v1.0.0)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: extract_version
        run: |
          ref="${GITHUB_REF##*/}"
          if [[ "$ref" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            version="${ref:1}"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          else
            echo "Tag does not match v<semver> pattern: $ref" >&2
            exit 1
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:${{ steps.extract_version.outputs.version }}
            ghcr.io/${{ github.repository }}/${{ inputs.image_name }}:latest
