# Workflow to build and publish Docker image for Dockerfile.Webapp
name: Build & Publish Webapp Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (must match git tag)'
        required: true

jobs:
  build-and-push:
    uses: ./.github/workflows/docker-publish.yml
    with:
      dockerfile: Dockerfile.Webapp
      image_name: webapp
      tag: ${{ github.event.inputs.tag }}
