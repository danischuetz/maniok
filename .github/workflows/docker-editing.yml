name: Build & Publish Maniok Preview Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to run workflow on'
        required: true

jobs:
  build-and-push:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      dockerfile: Dockerfile.Preview
      image_name: maniok-preview
      tag: ${{ github.event.inputs.tag }}
      environment: production
